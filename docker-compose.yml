services:
  backend:
    build:
      context: ./backend
    image: beatrix-movie-backend:local
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      CLIENT_URL: http://localhost:${FRONTEND_PORT:-8081},http://127.0.0.1:${FRONTEND_PORT:-8081},http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: beatrix-movie-frontend:local
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:3
    depends_on:
      - frontend
    command: http http://frontend:80 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    profiles:
      - tunnel
    restart: unless-stopped
