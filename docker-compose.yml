services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - beatrix-net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/beatrix_movie
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - beatrix-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - beatrix-net

volumes:
  mongo-data:

networks:
  beatrix-net:
    driver: bridge
